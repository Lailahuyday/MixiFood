worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream catalog_service {
        server catalog-service:8002;
    }

    upstream ingestion_service {
        server ingestion-service:8003;
    }

    upstream analytics_service {
        server analytics-service:8004;
    }

    upstream web_service {
        server web-service:8000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Django Web Service (Original UI)
        location / {
            proxy_pass http://web_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Tăng timeout cho Django
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Tĩnh (Static Files) từ Django
        location /static/ {
            proxy_pass http://web_service;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Auth Service - Public endpoints
        location /api/auth {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Catalog Service
        location /api/catalog {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://catalog_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout invalid_header updating;
        }

        # Ingestion Service - Event streaming
        location /api/events {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://ingestion_service;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # Analytics Service
        location /api/analytics {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://analytics_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger/OpenAPI documentation
        location ~ ^/api/(.+)/docs {
            proxy_pass http://$1_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/(.+)/openapi.json {
            proxy_pass http://$1_service;
            proxy_set_header Host $host;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
