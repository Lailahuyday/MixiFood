{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
    <link rel="stylesheet" href="{% static 'home/profile.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="profile-container">
        <h2><i class="fas fa-user-circle"></i> Thông tin cá nhân</h2>

        <a href="{% url 'home' %}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Về trang chủ
        </a>

        <!-- Hiển thị thông báo -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Form thông tin cá nhân -->
        <div class="form-section">
            <h3><i class="fas fa-user-edit"></i> Cập nhật thông tin</h3>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="update_profile" value="1">
                {{ profile_form.as_p }}
                <button type="submit" class="btn-update">
                    <i class="fas fa-save"></i> Cập nhật thông tin
                </button>
            </form>
        </div>

        <!-- Form đổi mật khẩu -->
        <div class="form-section password-section">
            <h3><i class="fas fa-lock"></i> Đổi mật khẩu</h3>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="change_password" value="1">
                {{ password_form.as_p }}
                <button type="submit" class="btn-change-password">
                    <i class="fas fa-key"></i> Đổi mật khẩu
                </button>
            </form>
        </div>
    </div>
</body>
</html>
